<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taj-81 License Admin</title>
<style>
  :root{--red:#ED1C24;--dark:#2b2b2d;--bg:#f4f2ee;--line:#e0ddd7}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,sans-serif}
  body{background:var(--bg);color:#111;padding:18px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:20px;color:var(--red);margin-bottom:4px}
  .sub{font-size:13px;color:#666;margin-bottom:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
  input,button{font-size:14px;padding:10px 12px;border-radius:8px;border:1px solid var(--line)}
  input{width:100%;margin-bottom:10px}
  button{background:var(--red);color:#fff;border:none;font-weight:700;cursor:pointer}
  button.sec{background:#555}
  button.tiny{padding:6px 10px;font-size:12px}
  button.warn{background:#b9881a}
  button.del{background:#444}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .gen{font-size:24px;font-weight:800;letter-spacing:3px;color:var(--red);text-align:center;padding:14px;background:#fff7f7;border:2px dashed var(--red);border-radius:10px;margin-top:10px;user-select:all}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:#888;font-weight:600;font-size:11px;text-transform:uppercase}
  .pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
  .on{background:#e3f7ec;color:#1a9c4e}
  .off{background:#fde8e8;color:var(--red)}
  .free{background:#eef;color:#5560d0}
  .code{font-weight:800;letter-spacing:1px}
  .msg{font-size:13px;margin-top:8px;min-height:18px}
  .acts{display:flex;gap:5px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <h1>Mehroz Taj-81 — License Admin</h1>
  <div class="sub">Codes generate karein, band/chalu karein, device reset karein.</div>

  <div class="card" id="loginCard">
    <input id="pw" type="password" placeholder="Admin password">
    <button onclick="login()">Login</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <div id="panel" style="display:none">
    <div class="card">
      <div class="row">
        <input id="note" placeholder="Note (optional): customer ka naam" style="flex:1;margin-bottom:0">
        <button onclick="gen()">+ Generate New Code</button>
      </div>
      <div class="gen" id="genBox" style="display:none"></div>
      <div class="msg" id="genMsg"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <b>All Licenses</b>
        <button class="sec tiny" onclick="loadList()">↻ Refresh</button>
      </div>
      <div style="overflow-x:auto">
        <table id="tbl">
          <thead><tr><th>Code</th><th>Status</th><th>Note</th><th>Actions</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // ====== apne server ka URL yahan daalein ======
  const API = "/.netlify/functions/license";
  // ===============================================
  let PW = "";

  function fmt(code){ return (code.match(/.{1,4}/g)||[]).join('-'); }

  async function call(cmd, extra){
    const res = await fetch(API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(Object.assign({action:'admin', password:PW, cmd}, extra||{}))
    });
    return res.json();
  }

  async function login(){
    PW = document.getElementById('pw').value;
    const m = document.getElementById('loginMsg');
    m.textContent = 'Checking...';
    const r = await call('list');
    if(r.ok){
      document.getElementById('loginCard').style.display='none';
      document.getElementById('panel').style.display='block';
      render(r.items);
    } else {
      m.textContent = 'Ghalat password.';
    }
  }

  async function gen(){
    const note = document.getElementById('note').value;
    const r = await call('generate', {note});
    if(r.ok){
      const box = document.getElementById('genBox');
      box.style.display='block';
      box.textContent = fmt(r.code);
      document.getElementById('genMsg').textContent = 'Naya code ban gaya — copy karke customer ko dein.';
      document.getElementById('note').value='';
      loadList();
    }
  }

  async function loadList(){
    const r = await call('list');
    if(r.ok) render(r.items);
  }

  function render(items){
    const tb = document.getElementById('rows');
    if(!items.length){ tb.innerHTML='<tr><td colspan="4" style="color:#999">Abhi koi code nahi.</td></tr>'; return; }
    tb.innerHTML = items.map(it=>{
      let status, cls;
      if(it.disabled){ status='Band'; cls='off'; }
      else if(!it.device){ status='Free'; cls='free'; }
      else { status='Active'; cls='on'; }
      const acts = [];
      if(it.disabled) acts.push(`<button class="tiny" onclick="act('enable','${it.code}')">Chalu</button>`);
      else acts.push(`<button class="tiny warn" onclick="act('disable','${it.code}')">Band</button>`);
      if(it.device) acts.push(`<button class="tiny sec" onclick="act('reset_device','${it.code}')">Reset Device</button>`);
      acts.push(`<button class="tiny del" onclick="del('${it.code}')">✕</button>`);
      return `<tr>
        <td class="code">${fmt(it.code)}</td>
        <td><span class="pill ${cls}">${status}</span></td>
        <td>${it.note||''}</td>
        <td><div class="acts">${acts.join('')}</div></td>
      </tr>`;
    }).join('');
  }

  async function act(cmd, code){
    await call(cmd, {code});
    loadList();
  }
  async function del(code){
    if(!confirm('Pakka delete karna hai? '+fmt(code))) return;
    await call('delete', {code});
    loadList();
  }
</script>
</body>
</html>
